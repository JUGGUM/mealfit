spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        format_sql_comments: false

jwt:
  secret: test-secret-key-for-testing-purposes-that-is-at-least-64-bytes-long-1234567890abcdef
  expiration: 3600000

logging:
  level:
    root: WARN
    dev.mealfit: INFO
    org.hibernate.SQL: WARN
