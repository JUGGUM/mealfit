version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mealfit
      SPRING_DATASOURCE_USERNAME: mealuser
      SPRING_DATASOURCE_PASSWORD: mealpass
      SPRING_JPA_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
    volumes:
      - ./build/libs/mealfit-0.0.1-SNAPSHOT.jar:/app/app.jar
    depends_on:
      - db
      - kafka
    networks:
      - mealfit-net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mealfit
      POSTGRES_USER: mealuser
      POSTGRES_PASSWORD: mealpass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - mealfit-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - mealfit-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - mealfit-net
    depends_on:
      - zookeeper

  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-remote-write-receiver
    depends_on:
      - app
    networks:
      - mealfit-net

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: mealfit
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/mealfit.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - mealfit-net

  # ── k6 부하 테스트 ── docker-compose --profile loadtest run k6 <script>
  k6:
    image: grafana/k6:latest
    profiles: [loadtest]
    volumes:
      - ./loadtest:/loadtest
    environment:
      # k6 → Prometheus Remote Write (메트릭을 Prometheus에 실시간 전송)
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_PUSH_INTERVAL: 5s
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
      BASE_URL: http://app:8081
    networks:
      - mealfit-net
    depends_on:
      - prometheus
      - app

volumes:
  db_data:
  prometheus_data:
  grafana_data:

networks:
  mealfit-net:
